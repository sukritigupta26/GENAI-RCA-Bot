services:
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      # ... (add postgres if needed)

  rca-worker:
    build: .
    command: python -m temporal_app.worker
    env_file: .env
    depends_on:
      - temporal

  fastapi:   # your previous API
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env